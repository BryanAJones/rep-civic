# Refresh GA candidate data nightly.
#
# Runs the full import pipeline (download → transform → seed) against
# Supabase once a day so that sitting federal members (Congress.gov),
# declared federal challengers (FEC), and sitting state legislators
# (OpenStates) stay current without manual re-runs.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   CONGRESS_API_KEY      — free key from https://gpo.congress.gov/
#   VITE_SUPABASE_URL     — Supabase project URL
#   SUPABASE_SERVICE_KEY  — Supabase service_role key (NOT the anon key)
#
# The job can also be triggered manually from the Actions tab via
# workflow_dispatch for ad-hoc refreshes (e.g., after a known withdrawal).

name: refresh-candidates

on:
  schedule:
    # 07:00 UTC = 03:00 ET — after most election news filings, before morning traffic
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Write .env for tsx --env-file
        run: |
          {
            echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}"
            echo "CONGRESS_API_KEY=${{ secrets.CONGRESS_API_KEY }}"
            echo "SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}"
          } > .env

      - name: Run full import pipeline
        run: npm run import:all

      - name: Clean up .env
        if: always()
        run: rm -f .env
